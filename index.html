<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投資組合追蹤系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --tw-blue: #1565c0; --us-orange: #bf360c; --global-green: #1b5e20;
      --bond-purple: #4a148c; --cash-gray: #37474f;
    }
    body { background: #f0f2f5; font-size: 13px; }
    .navbar { background: linear-gradient(135deg, #1a237e, #283593) !important; }
    .navbar-brand { font-weight: 700; font-size: 1.1rem; letter-spacing: 0.5px; }
    .nav-tab-btn { border-radius: 20px !important; font-size: 13px; padding: 4px 16px; }
    .nav-tab-btn.active { background: white !important; color: #1a237e !important; border-color: white !important; }

    .summary-bar { background: linear-gradient(135deg, #283593, #1565c0); color: white; padding: 10px 0; }
    .summary-item { text-align: center; padding: 0 8px; }
    .summary-label { font-size: 10px; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-value { font-size: 16px; font-weight: 700; line-height: 1.2; }
    .summary-divider { border-left: 1px solid rgba(255,255,255,0.3); }

    .badge-market { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; display: inline-block; }
    .badge-tw    { background: #bbdefb; color: #0d47a1; }
    .badge-us    { background: #ffe0b2; color: #bf360c; }
    .badge-global{ background: #c8e6c9; color: #1b5e20; }
    .badge-bond  { background: #e1bee7; color: #4a148c; }
    .badge-cash  { background: #cfd8dc; color: #263238; }

    .tbl-wrap { max-height: 62vh; overflow-y: auto; border-radius: 8px; }
    #portfolioTable { font-size: 12.5px; margin-bottom: 0; }
    #portfolioTable thead th {
      background: #1a237e; color: white; font-weight: 500;
      position: sticky; top: 0; z-index: 1; white-space: nowrap;
      padding: 8px 10px; border: none;
    }
    #portfolioTable td { vertical-align: middle; padding: 6px 10px; border-color: #e8eaf6; }
    .row-tw    { background: #e8f0fe; }
    .row-us    { background: #fff8f0; }
    .row-global{ background: #f0f8f0; }
    .row-bond  { background: #f8f0fe; }
    .row-cash  { background: #f5f5f5; }
    .row-tw:hover, .row-us:hover, .row-global:hover,
    .row-bond:hover, .row-cash:hover { filter: brightness(0.97); }

    .market-subtotal td { font-weight: 600; background: #eceff1 !important; color: #263238; font-size: 12px; }

    .kpi-card { background: white; border-radius: 12px; padding: 16px 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .kpi-icon { font-size: 28px; opacity: 0.85; }
    .kpi-value { font-size: 20px; font-weight: 700; color: #1a237e; }
    .kpi-label { font-size: 11px; color: #78909c; text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-sub { font-size: 12px; color: #546e7a; }

    .chart-card { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); height: 100%; }
    .chart-card h6 { font-size: 13px; font-weight: 600; color: #37474f; }

    .filter-btn { border-radius: 20px !important; font-size: 12px; padding: 3px 12px; }
    .filter-btn.active { background: #1a237e !important; color: white !important; border-color: #1a237e !important; }

    .alloc-bar { height: 22px; border-radius: 4px; background: #e8eaf6; overflow: hidden; display: flex; }
    .alloc-segment { height: 100%; transition: width 0.4s; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: 600; overflow: hidden; white-space: nowrap; }

    .price-spin { animation: spin 1.2s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pct-bar { height: 5px; border-radius: 3px; background: #e0e0e0; margin-top: 3px; }
    .pct-fill { height: 100%; border-radius: 3px; }

    .action-btn { padding: 2px 7px; font-size: 11px; }

    .modal-header { background: #1a237e; color: white; }
    .modal-header .btn-close { filter: invert(1); }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-auto { background: #43a047; }
    .dot-moneydj { background: #1e88e5; }
    .dot-manual { background: #fb8c00; }

    @media (max-width: 768px) {
      .summary-value { font-size: 13px; }
      .tbl-wrap { max-height: 55vh; }
    }

    .drag-handle { width: 24px; text-align: center; color: #b0bec5; cursor: grab; user-select: none; padding: 0 4px !important; }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle.drag-disabled { color: transparent; cursor: default; }
    tr.dragging { opacity: 0.35; }
    tr.drag-over-top td { border-top: 2px solid #1565c0 !important; }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <span class="navbar-brand">
      <i class="bi bi-graph-up-arrow me-2"></i>投資組合追蹤系統
    </span>
    <div class="d-flex gap-2 align-items-center">
      <button class="btn btn-sm btn-outline-light nav-tab-btn active" id="btnTabPortfolio" onclick="showTab('portfolio')">
        <i class="bi bi-table me-1"></i>持倉管理
      </button>
      <button class="btn btn-sm btn-outline-light nav-tab-btn" id="btnTabDashboard" onclick="showTab('dashboard')">
        <i class="bi bi-bar-chart-line me-1"></i>分析儀表板
      </button>
      <button class="btn btn-sm btn-outline-warning ms-2 nav-tab-btn" onclick="showRateModal()">
        <i class="bi bi-currency-exchange me-1"></i>匯率設定
      </button>
    </div>
  </div>
</nav>

<!-- SUMMARY BAR -->
<div class="summary-bar">
  <div class="container-fluid">
    <div class="d-flex flex-wrap justify-content-center align-items-center gap-1">
      <div class="summary-item">
        <div class="summary-label">總資產 (台幣)</div>
        <div class="summary-value text-warning" id="sTotalTWD">—</div>
      </div>
      <div class="summary-divider d-none d-md-block" style="height:36px;"></div>
      <div class="summary-item">
        <div class="summary-label">美元資產</div>
        <div class="summary-value" id="sTotalUSD">—</div>
      </div>
      <div class="summary-divider d-none d-md-block" style="height:36px;"></div>
      <div class="summary-item">
        <div class="summary-label">USD/TWD 匯率</div>
        <div class="summary-value" id="sRate" style="cursor:pointer;" onclick="showRateModal()">—</div>
      </div>
      <div class="summary-divider d-none d-md-block" style="height:36px;"></div>
      <div class="summary-item">
        <div class="summary-label">持倉數</div>
        <div class="summary-value" id="sCount">—</div>
      </div>
      <div class="summary-divider d-none d-md-block" style="height:36px;"></div>
      <div class="summary-item">
        <div class="summary-label">最後更新</div>
        <div class="summary-value" id="sLastUpdate" style="font-size:12px;">—</div>
      </div>
      <div class="summary-item ms-3">
        <button class="btn btn-sm btn-warning fw-bold" id="btnRefresh" onclick="refreshPrices()">
          <i class="bi bi-arrow-clockwise me-1"></i>更新報價
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ======== PORTFOLIO TAB ======== -->
<div id="tabPortfolio" class="container-fluid mt-3">
  <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
    <div class="d-flex gap-1 flex-wrap align-items-center">
      <span class="text-muted me-1" style="font-size:12px;">篩選：</span>
      <button class="btn btn-sm btn-outline-secondary filter-btn active" id="fAll" onclick="filterMarket('all', this)">全部</button>
      <button class="btn btn-sm btn-outline-secondary filter-btn" id="f台股" onclick="filterMarket('台股', this)"><span class="badge-market badge-tw">台股</span></button>
      <button class="btn btn-sm btn-outline-secondary filter-btn" id="f美股" onclick="filterMarket('美股', this)"><span class="badge-market badge-us">美股</span></button>
      <button class="btn btn-sm btn-outline-secondary filter-btn" id="f全球" onclick="filterMarket('全球', this)"><span class="badge-market badge-global">全球</span></button>
      <button class="btn btn-sm btn-outline-secondary filter-btn" id="f債券" onclick="filterMarket('債券', this)"><span class="badge-market badge-bond">債券</span></button>
      <button class="btn btn-sm btn-outline-secondary filter-btn" id="f現金" onclick="filterMarket('現金', this)"><span class="badge-market badge-cash">現金</span></button>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-success" onclick="openAddModal()"><i class="bi bi-plus-lg me-1"></i>新增持倉</button>
      <button class="btn btn-sm btn-outline-primary" onclick="exportJSON()"><i class="bi bi-download me-1"></i>匯出</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('importFile').click()"><i class="bi bi-upload me-1"></i>匯入</button>
    </div>
  </div>

  <div class="card shadow-sm mb-3">
    <div class="tbl-wrap">
      <table class="table table-hover" id="portfolioTable">
        <thead>
          <tr>
            <th style="width:28px;padding:4px;" title="拖曳調整順序"></th>
            <th>市場</th><th>代號</th><th>名稱</th>
            <th class="text-end">股數/單位</th>
            <th>幣別</th>
            <th class="text-end">現值</th>
            <th class="text-end">市值(台幣)</th>
            <th class="text-end">總佔比</th>
            <th class="text-end">市場佔比</th>
            <th>更新時間</th>
            <th style="width:88px;text-align:center;">操作</th>
          </tr>
        </thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Market summary cards -->
  <div class="row g-3" id="marketCards"></div>
</div>

<!-- ======== DASHBOARD TAB ======== -->
<div id="tabDashboard" class="container-fluid mt-3" style="display:none;">
  <div class="row g-3 mb-3" id="kpiRow"></div>

  <div class="row g-3 mb-3">
    <div class="col-lg-5 col-md-6">
      <div class="chart-card">
        <h6><i class="bi bi-pie-chart-fill me-2 text-primary"></i>市場配置</h6>
        <canvas id="chartMarket" height="240"></canvas>
      </div>
    </div>
    <div class="col-lg-3 col-md-6">
      <div class="chart-card">
        <h6><i class="bi bi-circle-half me-2 text-success"></i>股債現金</h6>
        <canvas id="chartAsset" height="240"></canvas>
      </div>
    </div>
    <div class="col-lg-4 col-md-12">
      <div class="chart-card">
        <h6><i class="bi bi-currency-dollar me-2 text-warning"></i>幣別配置</h6>
        <canvas id="chartCurrency" height="240"></canvas>
        <div id="allocBar" class="mt-3"></div>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-12">
      <div class="chart-card">
        <h6><i class="bi bi-bar-chart-horizontal-fill me-2 text-danger"></i>各持倉市值 (台幣)</h6>
        <canvas id="chartHoldings" height="110"></canvas>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-lg-6">
      <div class="chart-card">
        <h6><i class="bi bi-layers-fill me-2 text-info"></i>市場分類佔比</h6>
        <div id="marketBreakdown"></div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="chart-card">
        <h6><i class="bi bi-list-ul me-2 text-secondary"></i>前10大持倉</h6>
        <div id="top10Table"></div>
      </div>
    </div>
  </div>
</div>

<!-- ======== MODALS ======== -->
<!-- Add/Edit Holding Modal -->
<div class="modal fade" id="holdingModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"><i class="bi bi-plus-circle me-2"></i>新增持倉</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label fw-semibold">市場 <span class="text-danger">*</span></label>
            <select class="form-select form-select-sm" id="iMarket">
              <option>台股</option><option>美股</option><option>全球</option>
              <option>債券</option><option>現金</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">顯示代號 <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-sm" id="iSymbol" placeholder="如: 0050, VTI">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">Yahoo 代號 <small class="text-muted">(選填)</small></label>
            <input type="text" class="form-control form-control-sm" id="iYahoo" placeholder="如: 0050.TW, VTI">
            <div class="form-text">台股加 .TW；留空=手動更新</div>
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">幣別 <span class="text-danger">*</span></label>
            <select class="form-select form-select-sm" id="iCurrency">
              <option value="TWD">台幣 (TWD)</option>
              <option value="USD">美元 (USD)</option>
            </select>
          </div>
          <div class="col-md-6">

          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">持有股數/單位 <span class="text-danger">*</span></label>
            <input type="number" class="form-control form-control-sm" id="iShares" placeholder="0" step="0.0001" min="0">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">現值 (每股) <span class="text-danger">*</span></label>
            <input type="number" class="form-control form-control-sm" id="iPrice" placeholder="0.00" step="0.01" min="0">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">
              <span class="status-dot dot-moneydj me-1"></span>MoneyDJ 基金網址 <small class="text-muted">(選填，Yahoo 無法取得時使用)</small>

          </div>

            <label class="form-label fw-semibold">備註</label>

            <label class="form-label fw-semibold">目標配置 (%)</label>

          </div>

        <div id="pricePreview" class="alert alert-info mt-3 py-2" style="display:none;font-size:12px;"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="saveHolding()">

        </button>
      </div>
    </div>
  </div>
</div>

<!-- Exchange Rate Modal -->
<div class="modal fade" id="rateModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-currency-exchange me-2"></i>設定匯率</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label">USD / TWD 匯率</label>
        <input type="number" class="form-control" id="iRate" step="0.01" value="31.98">
        <div class="form-text mt-1">目前匯率：<span id="currentRateDisplay">—</span></div>
        <button class="btn btn-sm btn-outline-primary mt-2 w-100" onclick="fetchExchangeRate()">
          <i class="bi bi-cloud-download me-1"></i>自動抓取最新匯率
        </button>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="saveRate()">儲存</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ============================================================
// DEFAULT DATA (from spreadsheet)
// ============================================================
// DEFAULT_HOLDINGS: 範例資料（首次使用時載入）
// 注意：真實投資資料儲存於瀏覽器 localStorage，不會出現在此程式碼中
const DEFAULT_HOLDINGS = [];

// ============================================================
// STATE
// ============================================================
let state = {
  holdings: [],
  exchangeRate: 31.98,
  nextId: 31,
  currentFilter: 'all',
  editingId: null,
};
let charts = {};

const MARKET_COLORS = {
  '台股': '#1565c0', '美股': '#bf360c', '全球': '#1b5e20', '債券': '#4a148c', '現金': '#546e7a'
};
const MARKET_LIGHT = {
  '台股': '#bbdefb', '美股': '#ffe0b2', '全球': '#c8e6c9', '債券': '#e1bee7', '現金': '#cfd8dc'
};
const ASSET_GROUPS = { '股票': ['台股','美股','全球'], '債券': ['債券'], '現金': ['現金'] };

// ============================================================
// INIT / PERSISTENCE
// ============================================================
function loadState() {
  try {
    const saved = localStorage.getItem('portfolioState');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.holdings = parsed.holdings || [];
      state.exchangeRate = parsed.exchangeRate || 31.98;
      state.nextId = parsed.nextId || (state.holdings.length > 0
        ? Math.max(...state.holdings.map(h => h.id)) + 1 : 1);
    } else {
      // 首次使用：空白啟動，資料由使用者自行新增或匯入
      state.holdings = [];
      state.nextId = 1;
    }
  } catch(e) {
    state.holdings = [];
    state.nextId = 1;
  }
  // Migrate: assign order within each market group if missing
  const counters = {};
  ['台股','美股','全球','債券','現金'].forEach(m => counters[m] = 0);
  state.holdings.forEach(h => {
    if (h.order == null) { h.order = counters[h.market] ?? 0; counters[h.market]++; }
  });
}

function saveState() {
  localStorage.setItem('portfolioState', JSON.stringify({
    holdings: state.holdings,
    exchangeRate: state.exchangeRate,
    nextId: state.nextId,
  }));
}

// ============================================================
// CALCULATIONS
// ============================================================
function valueTWD(h) {
  const v = h.shares * h.price;
  return h.currency === 'USD' ? v * state.exchangeRate : v;
}

function calcMetrics() {
  const total = state.holdings.reduce((s, h) => s + valueTWD(h), 0);
  const totalUSD = state.holdings
    .filter(h => h.currency === 'USD')
    .reduce((s, h) => s + h.shares * h.price, 0);

  const byMarket = {};
  ['台股','美股','全球','債券','現金'].forEach(m => byMarket[m] = 0);
  state.holdings.forEach(h => { byMarket[h.market] = (byMarket[h.market] || 0) + valueTWD(h); });

  const byAsset = { '股票': 0, '債券': 0, '現金': 0 };
  Object.entries(ASSET_GROUPS).forEach(([g, markets]) => {
    markets.forEach(m => byAsset[g] += (byMarket[m] || 0));
  });

  const twdTotal = state.holdings.filter(h => h.currency === 'TWD').reduce((s, h) => s + h.shares * h.price, 0);
  const usdTWD = state.holdings.filter(h => h.currency === 'USD').reduce((s, h) => s + valueTWD(h), 0);

  return { total, totalUSD, byMarket, byAsset, twdTotal, usdTWD };
}

// ============================================================
// SUMMARY BAR
// ============================================================
function updateSummary() {
  const m = calcMetrics();
  document.getElementById('sTotalTWD').textContent = fmtTWD(m.total);
  document.getElementById('sTotalUSD').textContent = 'USD ' + fmtNum(m.totalUSD, 0);
  document.getElementById('sRate').textContent = state.exchangeRate.toFixed(2);
  document.getElementById('sCount').textContent = state.holdings.length + ' 筆';
  document.getElementById('sLastUpdate').textContent = new Date().toLocaleString('zh-TW', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

// ============================================================
// TABLE RENDERING
// ============================================================
function renderTable() {
  const m = calcMetrics();
  const filter = state.currentFilter;
  const markets = ['台股','美股','全球','債券','現金'];
  const tbody = document.getElementById('tBody');
  let html = '';

  const filtered = filter === 'all' ? markets : [filter];

  filtered.forEach(market => {
    const rows = state.holdings
      .filter(h => h.market === market)
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    if (!rows.length) return;
    const mTotal = m.byMarket[market] || 0;

    rows.forEach(h => {
      const vTWD = valueTWD(h);
      const pct = m.total > 0 ? vTWD / m.total * 100 : 0;
      const mPct = mTotal > 0 ? vTWD / mTotal * 100 : 0;

async function refreshPrices() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-arrow-clockwise price-spin me-1"></i>更新中...';

  const today = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
  let updated = 0;

  // --- Yahoo Finance batch fetch ---
  const symbols = [...new Set(state.holdings.filter(h => h.yahoo).map(h => h.yahoo))];
  if (symbols.length) {
    const priceMap = await batchFetchPrices(symbols);
    state.holdings.forEach(h => {
      if (h.yahoo && !h.yahoo.endsWith('.L') && priceMap[h.yahoo] != null) {
        h.price = priceMap[h.yahoo];
        h.priceDate = today;
        updated++;
      }
    });
  }

  // --- MoneyDJ fetch for funds not on Yahoo ---
  const mdHoldings = state.holdings.filter(h => !h.yahoo && h.moneydj);
  if (mdHoldings.length) {
    btn.innerHTML = '<i class="bi bi-arrow-clockwise price-spin me-1"></i>抓取基金報價...';
    const mdResults = await Promise.allSettled(
      mdHoldings.map(h => fetchMoneyDJPrice(h.moneydj).then(p => ({ h, p })))
    );
    mdResults.forEach(r => {
      if (r.status === 'fulfilled' && r.value.p != null) {
        r.value.h.price = r.value.p;
        r.value.h.priceDate = today;
        updated++;
      }
    });
  }

  saveState();
  renderAll();

  if (updated > 0) {
    showToast(`成功更新 ${updated} 筆報價`, 'success');
  } else {
    showToast('無法取得即時報價，請檢查網路連線', 'danger');
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>更新報價';
}

async function batchFetchPrices(symbols) {
  const map = {};
  // Try Yahoo Finance v7 batch API
  const url = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(',')}&fields=regularMarketPrice`;

  async function tryFetch(fetchUrl) {
    const r = await fetch(fetchUrl, { headers: { 'Accept': 'application/json' }, signal: AbortSignal.timeout(8000) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }

  let data = null;
  // Try direct
  try { data = await tryFetch(url); } catch(e) {}

  // Try CORS proxy 1
  if (!data) {
    try {
      data = await tryFetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    } catch(e) {}
  }

  // Try CORS proxy 2 - corsproxy.io
  if (!data) {
    try {
      data = await tryFetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`);
    } catch(e) {}
  }

  if (data?.quoteResponse?.result) {
    data.quoteResponse.result.forEach(q => {
      if (q.regularMarketPrice != null) map[q.symbol] = q.regularMarketPrice;
    });
  }

  // Fallback: fetch individual via chart API for any missing
  const missing = symbols.filter(s => map[s] == null && !s.endsWith('.L'));
  if (missing.length > 0) {
    await Promise.allSettled(missing.map(async sym => {
      const p = await fetchSinglePrice(sym);
      if (p != null) map[sym] = p;
    }));
  }

  return map;
}

async function fetchSinglePrice(symbol) {
  const url = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  async function tryFetch(u) {
    const r = await fetch(u, { signal: AbortSignal.timeout(6000) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    return d.chart?.result?.[0]?.meta?.regularMarketPrice ?? null;
  }
  try { return await tryFetch(url); } catch(e) {}
  try { return await tryFetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`); } catch(e) {}
  return null;
}

// MoneyDJ XPath: /html/body/div[3]/div/div[4]/form/table[1]/tbody/tr[2]/td[2]
const MONEYDJ_XPATH = '/html/body/div[3]/div/div[4]/form/table[1]/tbody/tr[2]/td[2]';

async function fetchMoneyDJPrice(url) {
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  ];
  for (const proxyUrl of proxies) {
    try {
      const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
      if (!r.ok) continue;
      const html = await r.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const result = document.evaluate(MONEYDJ_XPATH, doc, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null);
      const cell = result.singleNodeValue;
      if (cell) {
        const text = cell.textContent.trim().replace(/,/g, '');
        const price = parseFloat(text);
        if (!isNaN(price) && price > 0) return price;
      }
    } catch(e) {}
  }
  return null;
}

async function fetchExchangeRate() {
  showToast('正在取得最新匯率...', 'info');
  const rate = await fetchSinglePrice('USDTWD=X');
  if (rate) {
    document.getElementById('iRate').value = rate.toFixed(4);
    showToast(`最新匯率: ${rate.toFixed(4)}`, 'success');

}

    `目前市值：<strong>${fmtTWD(vTWD)}</strong> (${h.currency === 'USD' ? 'USD ' + fmtNum(h.shares * h.price, 2) : ''})`;

function saveHolding() {
  const market = document.getElementById('iMarket').value.trim();
  const symbol = document.getElementById('iSymbol').value.trim();
  const yahoo   = document.getElementById('iYahoo').value.trim() || null;
  const moneydj = document.getElementById('iMoneyDJ').value.trim() || null;
  const name    = document.getElementById('iName').value.trim();
  const currency = document.getElementById('iCurrency').value;
  const shares  = parseFloat(document.getElementById('iShares').value);
  const price   = parseFloat(document.getElementById('iPrice').value);
  const note    = document.getElementById('iNote').value.trim();
  const target  = parseFloat(document.getElementById('iTarget').value) || null;

  if (!market || !symbol || !name || isNaN(shares) || shares < 0 || isNaN(price) || price < 0) {
    showToast('請填寫所有必填欄位（市場、代號、名稱、股數、現值）', 'danger'); return;
  }

  if (state.editingId != null) {
    const h = state.holdings.find(x => x.id === state.editingId);
    if (h) Object.assign(h, { market, symbol, yahoo, moneydj, name, currency, shares, price, note, target });
  } else {
    const maxOrder = Math.max(-1, ...state.holdings.filter(h => h.market === market).map(h => h.order ?? 0));
    state.holdings.push({
      id: state.nextId++, market, symbol, yahoo, moneydj, name, currency, shares, price,
      priceDate: new Date().toLocaleDateString('zh-TW').replace(/\//g, '-'), note, target: target || null,
      order: maxOrder + 1
    });
  }

  bootstrap.Modal.getInstance(document.getElementById('holdingModal'))?.hide();
  saveState();
  renderAll();
  showToast(state.editingId != null ? '持倉已更新' : '新增持倉成功', 'success');
}

function deleteHolding(id) {
  const h = state.holdings.find(x => x.id === id);
  if (!h) return;
  if (!confirm(`確定要刪除「${h.name}」嗎？`)) return;
  state.holdings = state.holdings.filter(x => x.id !== id);
  saveState();
  renderAll();
  showToast('已刪除持倉', 'secondary');
}

function showTab(tab) {
  document.getElementById('tabPortfolio').style.display = tab === 'portfolio' ? '' : 'none';
  document.getElementById('tabDashboard').style.display = tab === 'dashboard' ? '' : 'none';
  document.getElementById('btnTabPortfolio').classList.toggle('active', tab === 'portfolio');
  document.getElementById('btnTabDashboard').classList.toggle('active', tab === 'dashboard');
  if (tab === 'dashboard') renderDashboard();
}

// ============================================================
// IMPORT / EXPORT
// ============================================================
function exportJSON() {
  const data = JSON.stringify({ holdings: state.holdings, exchangeRate: state.exchangeRate, nextId: state.nextId }, null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(data);
  a.download = `portfolio_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('已匯出 JSON 檔案', 'success');
}

function handleImport(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!Array.isArray(d.holdings)) throw new Error('格式錯誤');
      if (!confirm(`確定要匯入 ${d.holdings.length} 筆持倉資料？目前資料將被覆蓋。`)) return;
      state.holdings = d.holdings;
      state.exchangeRate = d.exchangeRate || 31.98;
      state.nextId = d.nextId || (Math.max(...d.holdings.map(h => h.id)) + 1);
      saveState(); renderAll();
      showToast(`成功匯入 ${d.holdings.length} 筆持倉`, 'success');
    } catch(err) {
      showToast('匯入失敗：' + err.message, 'danger');
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

// ============================================================
// HELPERS
// ============================================================
function mkChart(id, config) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  const canvas = document.getElementById(id);
  if (!canvas) return;
  charts[id] = new Chart(canvas.getContext('2d'), config);
}

function fmtTWD(v) {
  if (v >= 1e8) return 'NT$' + (v/1e8).toFixed(2) + '億';
  if (v >= 1e4) return 'NT$' + Math.round(v).toLocaleString('zh-TW');
  return 'NT$' + v.toFixed(0);
}

function fmtNum(v, dec = 2) {
  return v.toLocaleString('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function showToast(msg, type = 'info') {
  let t = document.getElementById('toastMsg');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toastMsg';
    t.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;min-width:240px;font-size:13px;';
    document.body.appendChild(t);
  }
  const colors = { success:'#43a047', danger:'#e53935', warning:'#fb8c00', info:'#1e88e5', secondary:'#546e7a' };
  t.innerHTML = `<div style="background:${colors[type]||'#333'};color:white;padding:10px 16px;border-radius:8px;box-shadow:0 3px 10px rgba(0,0,0,0.2);">
    <i class="bi bi-${type==='success'?'check-circle':type==='danger'?'x-circle':'info-circle'} me-2"></i>${msg}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.innerHTML = ''; }, 3500);
}

function renderAll() {
  updateSummary();
  renderTable();
  // Re-render dashboard if visible
  if (document.getElementById('tabDashboard').style.display !== 'none') renderDashboard();
}

// ============================================================
// DRAG AND DROP ROW REORDERING
// ============================================================
function initDragDrop() {
  const tbody = document.getElementById('tBody');
  let dragSrcId = null;
  let dragSrcMarket = null;
  let dragOverTr = null;

  tbody.addEventListener('dragstart', e => {
    const tr = e.target.closest('tr[data-id]');
    if (!tr) { e.preventDefault(); return; }
    dragSrcId = parseInt(tr.dataset.id);
    const h = state.holdings.find(x => x.id === dragSrcId);
    dragSrcMarket = h?.market;
    tr.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(dragSrcId));
  });

  tbody.addEventListener('dragover', e => {
    e.preventDefault();
    const tr = e.target.closest('tr[data-id]');
    if (!tr || tr === dragOverTr) return;
    const targetId = parseInt(tr.dataset.id);
    const targetH = state.holdings.find(x => x.id === targetId);
    if (dragOverTr) dragOverTr.classList.remove('drag-over-top');
    if (targetH?.market === dragSrcMarket && targetId !== dragSrcId) {
      dragOverTr = tr;
      tr.classList.add('drag-over-top');
    } else {
      dragOverTr = null;
    }
    e.dataTransfer.dropEffect = 'move';
  });

  tbody.addEventListener('dragleave', e => {
    if (!tbody.contains(e.relatedTarget)) {
      if (dragOverTr) { dragOverTr.classList.remove('drag-over-top'); dragOverTr = null; }
    }
  });

  tbody.addEventListener('dragend', () => {
    tbody.querySelectorAll('tr').forEach(r => r.classList.remove('dragging', 'drag-over-top'));
    dragSrcId = null; dragSrcMarket = null; dragOverTr = null;
  });

  tbody.addEventListener('drop', e => {
    e.preventDefault();
    if (dragOverTr) { dragOverTr.classList.remove('drag-over-top'); }
    const tr = e.target.closest('tr[data-id]');
    if (!tr || !dragSrcId) return;
    const targetId = parseInt(tr.dataset.id);
    if (targetId === dragSrcId) return;
    const srcH = state.holdings.find(x => x.id === dragSrcId);
    const tgtH = state.holdings.find(x => x.id === targetId);
    if (!srcH || !tgtH || srcH.market !== tgtH.market) return;

    // Reorder within market group
    const mktHoldings = state.holdings
      .filter(h => h.market === srcH.market)
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const srcIdx = mktHoldings.findIndex(h => h.id === dragSrcId);
    mktHoldings.splice(srcIdx, 1);
    const newTgtIdx = mktHoldings.findIndex(h => h.id === targetId);
    mktHoldings.splice(newTgtIdx, 0, srcH);
    mktHoldings.forEach((h, i) => { h.order = i; });

    dragSrcId = null; dragSrcMarket = null; dragOverTr = null;
    saveState();
    renderTable();
  });
}

// ============================================================
// BOOT
// ============================================================
loadState();
renderAll();
initDragDrop();

// Update shares/price preview in modal
['iShares','iPrice','iCurrency'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', () => {
    const shares = parseFloat(document.getElementById('iShares').value);
    const price  = parseFloat(document.getElementById('iPrice').value);
    const cur    = document.getElementById('iCurrency').value;
    if (!isNaN(shares) && !isNaN(price) && shares > 0 && price > 0) {
      const v = shares * price;
      const vTWD = cur === 'USD' ? v * state.exchangeRate : v;
      const el = document.getElementById('pricePreview');
      el.style.display = 'block';
      el.innerHTML = `預估市值：<strong>${fmtTWD(vTWD)}</strong>${cur==='USD'?' (USD '+fmtNum(v,2)+')':''}`;
    }
  });
});
